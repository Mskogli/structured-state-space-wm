dataset: depth_dataset
seed: 72

wm:
  rnn_mode: False
  sample_mean: True
  image_dist_type: "MSE"
  latent_dist_type: "Gaussian"
  latent_dim: 256
  alpha: 0.65
  beta_rec: 1.0
  beta_kl: 1.0
  clip_kl_loss: True
  kl_lower_bound: 2.0
  loss_reduction: "sum"


model:
  d_model: 512   
  n_layers: 2
  n_blocks: 6
  dropout: 0.4
  layer:
    l_max: 99
    N: 128

train:
  epochs: 200
  bsz: 8
  lr: 0.0001
  lr_schedule: true
  weight_decay: 0.015
  checkpoint: true

wandb:
  mode: online
  project: S4WM